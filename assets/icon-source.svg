<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3A8DDE"/>
      <stop offset="1" stop-color="#1E5BA0"/>
    </linearGradient>
    <clipPath id="bodyClip">
      <rect x="240" y="296" width="544" height="480" rx="56"/>
    </clipPath>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Calendar body with subtle shadow -->
  <g filter="url(#shadow)">
    <rect x="240" y="296" width="544" height="480" rx="56" fill="#FFFFFF"/>
    <!-- Red top band, clipped to body shape -->
    <rect x="240" y="296" width="544" height="88" fill="#E63946" clip-path="url(#bodyClip)"/>
  </g>

  <!-- Binding rings -->
  <rect x="378" y="216" width="40" height="124" rx="20" fill="#1E5BA0"/>
  <rect x="606" y="216" width="40" height="124" rx="20" fill="#1E5BA0"/>

  <!-- Calendar grid cells -->
  <g fill="#D1D5DB">
    <rect x="300" y="420" width="80" height="60" rx="10"/>
    <rect x="400" y="420" width="80" height="60" rx="10"/>
    <rect x="500" y="420" width="80" height="60" rx="10"/>
    <rect x="600" y="420" width="80" height="60" rx="10"/>

    <rect x="300" y="500" width="80" height="60" rx="10"/>
    <rect x="500" y="500" width="80" height="60" rx="10"/>
    <rect x="600" y="500" width="80" height="60" rx="10"/>

    <rect x="300" y="580" width="80" height="60" rx="10"/>
    <rect x="400" y="580" width="80" height="60" rx="10"/>
    <rect x="500" y="580" width="80" height="60" rx="10"/>
    <rect x="600" y="580" width="80" height="60" rx="10"/>

    <rect x="300" y="660" width="80" height="60" rx="10"/>
    <rect x="400" y="660" width="80" height="60" rx="10"/>
    <rect x="600" y="660" width="80" height="60" rx="10"/>
  </g>

  <!-- Highlighted day (confirmed appointment) -->
  <rect x="400" y="500" width="80" height="60" rx="10" fill="#2D7DD2"/>
  <!-- Checkmark -->
  <path d="M 416 532 L 436 552 L 470 518" stroke="#FFFFFF" stroke-width="12"
        fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
